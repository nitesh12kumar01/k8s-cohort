apiVersion: v1
kind: Pod
metadata:
  name: demo-sidecar
spec:
  containers:
  # 1. The Main Application Container
  - name: app-container
    image: busybox
    command: ["sh", "-c"]
    args:
    - while true; do
        echo "$(date) - Service is processing request" >> /var/log/app.log;
        sleep 5;
      done
    volumeMounts:
    - name: shared-logs
      mountPath: /var/log

  # 2. The Sidecar Container (Log Shipper)
  - name: sidecar-container
    image: alpine:latest # Using a version with 'tail'
    command: ["sh", "-c"]
    args:
    - tail -f /var/log/app.log
    volumeMounts:
    - name: shared-logs
      mountPath: /var/log

  # The Shared Storage
  volumes:
  - name: shared-logs
    emptyDir: {}
